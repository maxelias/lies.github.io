<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>App Title</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://file.garden https://play-lh.googleusercontent.com; img-src 'self' data: https://file.garden https://play-lh.googleusercontent.com; media-src 'self' https://file.garden;">
<link rel="icon" href="https://play-lh.googleusercontent.com/uulKLexOFnvrpg5ltH3jBAnCbMMed6VbaogVr9etutmFXO-P5w0JRa7sgJ1EstibjtI=w240-h480-rw" type="image/png">
<link rel="apple-touch-icon" href="https://file.garden/aeSpG6iUoRzyQ8ca/Screenshot%202026-04-28%20at%204.53.50%E2%80%AFpm.png">
<link rel="preload" as="image" href="https://file.garden/aeSpG6iUoRzyQ8ca/Untitled%20(11).gif">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="App Title">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; background-color: #111111; }
  body { background: transparent; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .page { display: none; width: 100vw; min-height: 100vh; }
  .page.active { display: block; }
  #page2 { background: #111111; }
  #p1-top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 10px; background: #111111; z-index: 1000; display: none; }
  .header-wrap { position: fixed; top: 0; left: 0; width: 100%; z-index: 999; background: #111111; }
  #h2-wrap { background: #111111; }
  .header-wrap img { width: 100%; display: block; }
  #header1-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; }
  #header1-left, #header1-right { flex: 1; height: 100%; cursor: pointer; }
  .footer-wrap { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 999; background: #111111; }
  .footer-wrap img { width: 100%; display: block; cursor: pointer; }
  .content { width: 100%; }
  #p1-content { background: #111111; }
  #p2-content { background: #111111; }
  .main-gif, .page2-main { width: 100%; display: block; }

  #gif-wrapper { position: relative; display: block; width: 100%; background: #111111; }

  /* No filters on GIF */
  #main-gif { width: 100%; display: block; }

  /* Tap zones */
  #licence-tap-left, #licence-tap-right {
    position: absolute;
    top: 53.5%;
    height: 2%;
    width: 50%;
    z-index: 50;
    cursor: pointer;
  }
  #licence-tap-left  { left: 0; }
  #licence-tap-right { left: 50%; }

  /* Refresh text */
  #refresh-text {
    position: absolute; top: 45px; right: 7.5px;
    text-align: right;
    font-family: "Acumin Pro", Arial, sans-serif;
    font-weight: bold; font-size: 14px; line-height: 1.36;
    color: #d5d5d5;
    pointer-events: none; z-index: 10; white-space: nowrap;
  }
  #pulse-group { display: inline-block; transform-origin: top right; will-change: transform; }

  @keyframes textPulse {
    0%   { transform: scale(1);   }
    45%  { transform: scale(1.4); }
    100% { transform: scale(1);   }
  }
  #pulse-group.pulse { animation: textPulse 0.5s cubic-bezier(0.45, 0, 0.55, 1) forwards; }

  /* Spinner */
  #spinner {
    position: fixed; left: 50%;
    width: 28px; height: 28px; margin-left: -14px;
    opacity: 0; z-index: 1000; pointer-events: none;
    transform: rotate(0deg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.3s, transform 0.3s;
  }
  #spinner.dragging { transition: none; }

  .bar {
    position: absolute; width: 2.5px; height: 7.5px;
    background: rgba(255,255,255,0.4);
    top: 0; left: 50%;
    transform-origin: center 14px; border-radius: 2px;
  }
  .bar:nth-child(1)  { transform: rotate(0deg);   }
  .bar:nth-child(2)  { transform: rotate(30deg);  }
  .bar:nth-child(3)  { transform: rotate(60deg);  }
  .bar:nth-child(4)  { transform: rotate(90deg);  }
  .bar:nth-child(5)  { transform: rotate(120deg); }
  .bar:nth-child(6)  { transform: rotate(150deg); }
  .bar:nth-child(7)  { transform: rotate(180deg); }
  .bar:nth-child(8)  { transform: rotate(210deg); }
  .bar:nth-child(9)  { transform: rotate(240deg); }
  .bar:nth-child(10) { transform: rotate(270deg); }
  .bar:nth-child(11) { transform: rotate(300deg); }
  .bar:nth-child(12) { transform: rotate(330deg); }

  @keyframes rotateCircle { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinning { animation: rotateCircle 1.2s linear infinite !important; opacity: 1 !important; transition: none !important; }

  /* Bottom sheet popup */
  #popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 2000; display: none; transition: background 0.38s ease; }
  #popup-overlay.open { background: rgba(0,0,0,0.6); }
  #popup-sheet { position: fixed; bottom: 0; left: 0; width: 100%; max-height: 90vh; z-index: 2001; transform: translateY(100%); transition: transform 0.42s cubic-bezier(0.32, 0.72, 0, 1); border-radius: 18px 18px 0 0; overflow: hidden; background: #1a1a1a; will-change: transform; }
  #popup-sheet.open { transform: translateY(0); }
  #popup-sheet img { width: 100%; height: auto; display: block; }

  /* Privacy cover — shown when app is backgrounded */
  #privacy-cover {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    background: #111111;
  }
  #privacy-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Shared modal styles */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 3000; display: none; align-items: center; justify-content: center; transition: background 0.3s ease; padding: 10px; }
  .modal-overlay.open { display: flex; background: rgba(0,0,0,0.65); }
  .modal-box { background: #373b3e; border-radius: 6px; width: 100%; max-width: 100%; max-height: 92vh; overflow: hidden; transform: scale(0.92) translateY(12px); opacity: 0; transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.28s ease; display: flex; flex-direction: column; }
  .modal-overlay.open .modal-box { transform: scale(1) translateY(0); opacity: 1; }
  .modal-header { background: #373b3e; padding: 18px 18px 14px; flex-shrink: 0; }
  .modal-header h2 { color: #ffffff; font-family: -apple-system, "SF Pro Display", Arial, sans-serif; font-size: 17px; font-weight: 600; letter-spacing: -0.2px; text-align: center; }
  .modal-divider { height: 1px; background: rgba(255,255,255,0.25); margin: 0; flex-shrink: 0; }
  .modal-body { background: #373b3e; padding: 20px 20px 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
  .modal-footer { background: #373b3e; padding: 14px 20px 22px; display: flex; justify-content: center; flex-shrink: 0; }
  .modal-close-btn { background: transparent; border: 1.5px solid #d1e6f0; border-radius: 6px; color: #d1e6f0; font-family: -apple-system, "SF Pro Text", Arial, sans-serif; font-size: 16px; font-weight: 500; padding: 14px 0; width: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .modal-close-btn:active { opacity: 0.6; }
  .licence-field-label { color: #a8b0b8; font-family: -apple-system, "SF Pro Text", Arial, sans-serif; font-size: 13px; font-weight: 400; margin-bottom: 4px; }
  .licence-field-value { color: #ffffff; font-family: -apple-system, "SF Pro Display", Arial, sans-serif; font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; }
  .licence-field-value:last-child { margin-bottom: 0; }
  #conditions-body img { width: 100%; height: auto; display: block; border-radius: 4px; }
</style>
</head>
<body>

<!-- Privacy cover screen -->
<div id="privacy-cover">
  <img src="https://file.garden/aeSpG6iUoRzyQ8ca/Screenshot%202026-05-02%20at%202.06.03%E2%80%AFpm.png" alt="">
</div>

<div id="p1-top-bar"></div>

<div class="header-wrap" id="h1-wrap" style="display:none">
  <img src="https://file.garden/aeSpG6iUoRzyQ8ca/Untitled-3%20(2).png" id="header1" draggable="false" style="pointer-events:none">
  <div id="header1-zones">
    <div id="header1-left"></div>
    <div id="header1-right"></div>
  </div>
</div>

<div class="header-wrap" id="h2-wrap" style="display:none">
  <img src="https://file.garden/aeSpG6iUoRzyQ8ca/Page2header.png" id="header2">
</div>

<div id="spinner">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div id="page1" class="page">
  <div class="content" id="p1-content">
    <div id="gif-wrapper">
      <img
        id="main-gif"
        src="https://file.garden/aeSpG6iUoRzyQ8ca/Untitled%20(11).gif"
        class="main-gif"
        fetchpriority="high"
        decoding="async"
      >
      <div id="licence-tap-left"></div>
      <div id="licence-tap-right"></div>
      <div id="refresh-text"></div>
    </div>
  </div>
</div>

<div id="page2" class="page">
  <div class="content" id="p2-content">
    <img src="https://file.garden/aeSpG6iUoRzyQ8ca/page2.png" class="page2-main">
  </div>
  <div class="footer-wrap" id="f2-wrap">
    <img src="https://file.garden/aeSpG6iUoRzyQ8ca/page2footer.png" id="footer2">
  </div>
</div>

<div id="popup-overlay"></div>
<div id="popup-sheet">
  <img src="https://file.garden/aeSpG6iUoRzyQ8ca/popup-7%20(1).png" alt="">
</div>

<div id="licence-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header"><h2>More about your licence</h2></div>
    <div class="modal-divider"></div>
    <div class="modal-body">
      <div class="licence-field-label">Class</div>
      <div class="licence-field-value">C — Vehicle seating up to 12 adults,<br>to 4.5 tonnes GVM; Tractor,<br>Implement</div>
      <div class="licence-field-label">Expiry date</div>
      <div class="licence-field-value">07 Mar 2031</div>
    </div>
    <div class="modal-footer">
      <button class="modal-close-btn" id="licence-close">Close</button>
    </div>
  </div>
</div>

<div id="conditions-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header"><h2>Conditions</h2></div>
    <div class="modal-divider"></div>
    <div class="modal-body" id="conditions-body">
      <img src="https://file.garden/aeSpG6iUoRzyQ8ca/Untitled-3%20(3).png" alt="Conditions">
    </div>
    <div class="modal-footer">
      <button class="modal-close-btn" id="conditions-close">Close</button>
    </div>
  </div>
</div>

<script>
  const GIF_SRC = "https://file.garden/aeSpG6iUoRzyQ8ca/Untitled%20(11).gif";
  const p1 = document.getElementById("page1");
  const p2 = document.getElementById("page2");
  const h1wrap = document.getElementById("h1-wrap");
  const h2wrap = document.getElementById("h2-wrap");
  const f2wrap = document.getElementById("f2-wrap");
  const p1TopBar = document.getElementById("p1-top-bar");
  const spinner = document.getElementById("spinner");
  const html = document.documentElement;
  const popupOverlay = document.getElementById("popup-overlay");
  const popupSheet = document.getElementById("popup-sheet");
  const mainGif = document.getElementById("main-gif");
  const privacyCover = document.getElementById("privacy-cover");
  const RELOAD_THRESHOLD = 190;
  const START_THRESHOLD = 40;

  /* ── Privacy cover for iOS home screen web app ── */
  /* iOS fires window blur when user swipes up to app switcher */
  let coverTimer = null;

  function showCover() {
    privacyCover.style.display = "block";
  }

  function hideCover() {
    clearTimeout(coverTimer);
    privacyCover.style.display = "none";
  }

  /* Window blur = app going to background/switcher */
  window.addEventListener("blur", () => {
    /* Small delay to avoid flashing on innocent focus loss */
    coverTimer = setTimeout(showCover, 80);
  });

  /* Window focus = app coming back to foreground */
  window.addEventListener("focus", hideCover);

  /* Backup: visibilitychange for other browsers */
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) { showCover(); } else { hideCover(); }
  });

  /* pagehide/pageshow for extra coverage */
  window.addEventListener("pagehide", showCover);
  window.addEventListener("pageshow", hideCover);

  function openPopup() {
    popupOverlay.style.display = "block";
    popupOverlay.getBoundingClientRect();
    popupOverlay.classList.add("open");
    popupSheet.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closePopup() {
    popupOverlay.classList.remove("open");
    popupSheet.classList.remove("open");
    document.body.style.overflow = "";
    popupOverlay.addEventListener("transitionend", function h() {
      if (!popupOverlay.classList.contains("open")) popupOverlay.style.display = "none";
      popupOverlay.removeEventListener("transitionend", h);
    });
  }
  popupOverlay.addEventListener("touchend", e => { e.preventDefault(); closePopup(); }, { passive: false });
  popupOverlay.addEventListener("click", closePopup);
  let sheetStartY = 0;
  popupSheet.addEventListener("touchstart", e => { sheetStartY = e.touches[0].clientY; }, { passive: true });
  popupSheet.addEventListener("touchend", e => { if (e.changedTouches[0].clientY - sheetStartY > 60) closePopup(); }, { passive: true });

  function openModal(id) {
    const el = document.getElementById(id);
    el.style.display = "flex";
    el.getBoundingClientRect();
    el.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeModal(id) {
    const el = document.getElementById(id);
    el.classList.remove("open");
    document.body.style.overflow = "";
    setTimeout(() => { if (!el.classList.contains("open")) el.style.display = "none"; }, 300);
  }
  ["licence-modal", "conditions-modal"].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener("click", e => { if (e.target === el) closeModal(id); });
    el.addEventListener("touchend", e => { if (e.target === el) { e.preventDefault(); closeModal(id); } }, { passive: false });
  });
  document.getElementById("licence-close").addEventListener("click", () => closeModal("licence-modal"));
  document.getElementById("licence-close").addEventListener("touchend", e => { e.preventDefault(); closeModal("licence-modal"); }, { passive: false });
  document.getElementById("conditions-close").addEventListener("click", () => closeModal("conditions-modal"));
  document.getElementById("conditions-close").addEventListener("touchend", e => { e.preventDefault(); closeModal("conditions-modal"); }, { passive: false });

  function addTapZone(id, fn) {
    const el = document.getElementById(id);
    let tDown = 0;
    el.addEventListener("touchstart", () => { tDown = Date.now(); }, { passive: true });
    el.addEventListener("touchend", e => { if (Date.now() - tDown < 300) { e.preventDefault(); fn(); } }, { passive: false });
    el.addEventListener("click", fn);
  }
  addTapZone("licence-tap-left", () => openModal("licence-modal"));
  addTapZone("licence-tap-right", () => openModal("conditions-modal"));

  function addZoneTap(id, fn) {
    const el = document.getElementById(id);
    let tDown = 0;
    el.addEventListener("touchstart", () => { tDown = Date.now(); }, { passive: true });
    el.addEventListener("touchend", e => { if (Date.now() - tDown < 300) { e.preventDefault(); fn(); } }, { passive: false });
    el.addEventListener("click", fn);
  }
  addZoneTap("header1-left", () => showPage(2));
  addZoneTap("header1-right", openPopup);

  const HOLD_OFFSET = 52;
  function fakeRefresh() {
    const activeContent = p1.classList.contains("active") ? document.getElementById("p1-content") : document.getElementById("p2-content");
    spinner.classList.add("spinning");
    setTimeout(() => {
      setRefreshText();
      requestAnimationFrame(() => {
        const pg = document.getElementById("pulse-group");
        if (pg) { pg.classList.remove("pulse"); void pg.offsetWidth; pg.classList.add("pulse"); }
      });
      mainGif.src = "";
      requestAnimationFrame(() => { mainGif.src = GIF_SRC; });
      activeContent.style.transition = "transform 0.35s cubic-bezier(0.32, 0.72, 0, 1)";
      activeContent.style.transform = "translateY(0)";
      spinner.classList.remove("spinning");
      spinner.style.transition = "opacity 0.4s";
      spinner.style.opacity = "0";
      setTimeout(() => { spinner.style.transition = ""; spinner.style.transform = "rotate(0deg)"; activeContent.style.transition = ""; }, 400);
    }, 750);
  }

  function setOffsets() {
    const isP1 = p1.classList.contains("active");
    const topOff = isP1 ? 10 : 0;
    const hHeight = (isP1 ? h1wrap.offsetHeight : h2wrap.offsetHeight) + topOff;
    const fHeight = f2wrap.offsetHeight || 60;
    document.getElementById("p1-content").style.paddingTop = hHeight + "px";
    document.getElementById("p2-content").style.paddingTop = (hHeight + 40) + "px";
    document.getElementById("p2-content").style.paddingBottom = fHeight + "px";
    spinner.style.top = (hHeight + 12) + "px";
    html.style.background = isP1 ? "#111111" : "rgb(0, 37, 100)";
  }

  function setRefreshText() {
    const now = new Date();
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const d = now.getDate(), mo = months[now.getMonth()], y = now.getFullYear();
    let h = now.getHours();
    const min = String(now.getMinutes()).padStart(2, "0");
    const ampm = h >= 12 ? "pm" : "am";
    h = h % 12 || 12;
    document.getElementById("refresh-text").innerHTML = `Refreshed<br><span id="pulse-group">${d} ${mo} ${y}<br>${h}:${min}${ampm}</span>`;
  }

  function showPage(n) {
    p1.classList.toggle("active", n === 1);
    p2.classList.toggle("active", n === 2);
    if (n === 1) {
      h1wrap.style.display = "block"; h1wrap.style.top = "10px";
      h2wrap.style.display = "none";
      p1TopBar.style.display = "block";
    } else {
      h1wrap.style.display = "none";
      h2wrap.style.display = "block"; h2wrap.style.top = "0px";
      p1TopBar.style.display = "none";
    }
    localStorage.setItem("currentPage", n);
    setOffsets();
    window.scrollTo(0, 0);
  }

  function init() {
    setRefreshText();
    const saved = localStorage.getItem("currentPage");
    showPage(saved ? parseInt(saved) : 2);
    setTimeout(() => { const pg = document.getElementById("pulse-group"); if (pg) pg.classList.add("pulse"); }, 10);
  }

  document.getElementById("header2").addEventListener("click", () => showPage(1));
  document.getElementById("page2").addEventListener("click", () => showPage(1));
  window.addEventListener("load", init);
  window.addEventListener("resize", setOffsets);

  let startY = 0, isDragging = false;
  window.addEventListener("touchstart", e => {
    if (window.scrollY <= 5) { startY = e.touches[0].clientY; isDragging = true; spinner.classList.add("dragging"); }
  }, { passive: true });

  function getDragContent() {
    return p1.classList.contains("active") ? document.getElementById("p1-content") : document.getElementById("p2-content");
  }

  window.addEventListener("touchmove", e => {
    if (!isDragging || spinner.classList.contains("spinning")) return;
    const diffY = e.touches[0].clientY - startY;
    if (diffY > START_THRESHOLD) {
      const progress = Math.min((diffY - START_THRESHOLD) / (RELOAD_THRESHOLD - START_THRESHOLD), 1);
      spinner.style.opacity = progress;
      spinner.style.transform = `rotate(${progress * 90}deg)`;
      getDragContent().style.transition = "none";
      getDragContent().style.transform = `translateY(${progress * HOLD_OFFSET}px)`;
    } else {
      spinner.style.opacity = 0;
      spinner.style.transform = "rotate(0deg)";
      getDragContent().style.transform = "translateY(0)";
    }
  }, { passive: true });

  window.addEventListener("touchend", e => {
    if (!isDragging) return;
    spinner.classList.remove("dragging");
    const diffY = e.changedTouches[0].clientY - startY;
    if (diffY >= RELOAD_THRESHOLD) {
      fakeRefresh();
    } else {
      spinner.style.opacity = 0;
      spinner.style.transform = "rotate(0deg)";
      const c = getDragContent();
      c.style.transition = "transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)";
      c.style.transform = "translateY(0)";
      setTimeout(() => { c.style.transition = ""; }, 300);
    }
    isDragging = false;
  });

  let startX = 0;
  window.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  window.addEventListener("touchend", e => {
    const diffX = e.changedTouches[0].clientX - startX;
    if (p1.classList.contains("active") && startX < 50 && diffX > 80) showPage(2);
  });
</script>
</body>
</html>
